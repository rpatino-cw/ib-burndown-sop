<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>IB Switch Lookup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600;9..144,800&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf6f0;
    --cream-dark: #f0ebe3;
    --ink: #1c1917;
    --ink-light: #44403c;
    --ink-muted: #78716c;
    --amber: #d97706;
    --amber-light: #fef3c7;
    --red: #dc2626;
    --red-light: #fee2e2;
    --green: #16a34a;
    --green-light: #dcfce7;
    --blue: #2563eb;
    --blue-light: #dbeafe;
    --navy: #0f172a;
    --radius: 14px;
    --font-body: 'DM Sans', system-ui, sans-serif;
    --font-display: 'Fraunces', Georgia, serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font-body);
    background: var(--cream);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  .app { max-width: 520px; margin: 0 auto; padding: 20px; }

  /* ── HEADER ── */
  .header {
    text-align: center; padding: 24px 0 20px;
  }
  .header h1 {
    font-family: var(--font-display); font-weight: 800;
    font-size: 1.5rem; color: var(--ink); margin-bottom: 4px;
  }
  .header p { font-size: 0.85rem; color: var(--ink-muted); }
  .badge {
    display: inline-block; background: var(--amber);
    color: white; font-weight: 700; font-size: 0.65rem;
    padding: 2px 8px; border-radius: 4px;
    text-transform: uppercase; letter-spacing: 0.05em;
    margin-bottom: 8px;
  }

  /* ── INPUT ── */
  .input-group {
    display: flex; gap: 8px; margin-bottom: 24px;
  }
  .input-field {
    flex: 1; padding: 14px 16px;
    border: 2px solid rgba(28,25,23,0.1);
    border-radius: 12px; font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 1.1rem; font-weight: 600;
    background: white; color: var(--ink);
    outline: none; transition: border-color 0.15s;
    text-transform: uppercase;
  }
  .input-field::placeholder {
    text-transform: none; font-family: var(--font-body);
    font-weight: 400; color: var(--ink-muted); font-size: 0.9rem;
  }
  .input-field:focus { border-color: var(--amber); }
  .btn-go {
    padding: 14px 24px; border: none;
    border-radius: 12px; background: var(--ink);
    color: var(--cream); font-family: var(--font-body);
    font-size: 0.95rem; font-weight: 700;
    cursor: pointer; transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-go:hover { opacity: 0.85; }
  .btn-go:active { transform: scale(0.97); }

  /* ── QUICK EXAMPLES ── */
  .examples {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin: -16px 0 20px; justify-content: center;
  }
  .ex-chip {
    font-size: 0.72rem; font-weight: 600;
    padding: 4px 10px; border-radius: 6px;
    cursor: pointer; transition: all 0.15s;
    border: 1px solid rgba(28,25,23,0.08);
    background: white; color: var(--ink-muted);
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .ex-chip:hover { background: var(--cream-dark); color: var(--ink); }

  /* ── RESULT CARD ── */
  .result {
    animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .type-badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.05em; padding: 5px 12px;
    border-radius: 8px; margin-bottom: 16px;
  }
  .type-core { background: #ede9fe; color: #7c3aed; }
  .type-spine { background: #e0f2fe; color: #0284c7; }
  .type-leaf { background: var(--green-light); color: var(--green); }
  .type-node { background: var(--amber-light); color: var(--amber); }

  .parsed {
    background: white; border-radius: var(--radius);
    padding: 16px; margin-bottom: 16px;
    border: 1px solid rgba(28,25,23,0.06);
  }
  .parsed-row {
    display: flex; justify-content: space-between;
    padding: 6px 0; font-size: 0.88rem;
    border-bottom: 1px solid rgba(28,25,23,0.04);
  }
  .parsed-row:last-child { border-bottom: none; }
  .parsed-label { color: var(--ink-muted); font-size: 0.8rem; }
  .parsed-value { font-weight: 700; color: var(--ink); font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.85rem; }

  /* ── STEPS ── */
  .steps { display: flex; flex-direction: column; gap: 12px; }
  .step {
    background: white; border-radius: var(--radius);
    padding: 16px 18px;
    border: 1px solid rgba(28,25,23,0.06);
    animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  .step:nth-child(1) { animation-delay: 0.05s; }
  .step:nth-child(2) { animation-delay: 0.1s; }
  .step:nth-child(3) { animation-delay: 0.15s; }
  .step:nth-child(4) { animation-delay: 0.2s; }
  .step:nth-child(5) { animation-delay: 0.25s; }
  .step-num {
    font-family: var(--font-display); font-weight: 800;
    font-size: 0.7rem; color: var(--amber);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 4px;
  }
  .step h3 {
    font-family: var(--font-display); font-weight: 600;
    font-size: 1rem; margin-bottom: 4px; color: var(--ink);
  }
  .step p {
    font-size: 0.85rem; color: var(--ink-light); line-height: 1.6;
  }
  .step code {
    background: var(--cream-dark); padding: 1px 6px;
    border-radius: 4px; font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.82em; color: var(--ink);
  }

  /* ── CALLOUT ── */
  .callout {
    border-radius: 10px; padding: 12px 14px;
    font-size: 0.82rem; line-height: 1.55;
    display: flex; gap: 8px; align-items: flex-start;
    margin-top: 10px;
  }
  .callout-icon { font-size: 1rem; flex-shrink: 0; }
  .callout-warn { background: var(--amber-light); border: 1px solid #fde68a; color: #92400e; }
  .callout-info { background: var(--blue-light); border: 1px solid #93c5fd; color: #1e40af; }
  .callout-danger { background: var(--red-light); border: 1px solid #fca5a5; color: #991b1b; }
  .callout strong { font-weight: 700; }

  /* ── ELEVATION TABS ── */
  .elev-tabs {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;
  }
  .elev-tab {
    font-size: 0.75rem; font-weight: 600;
    padding: 5px 10px; border-radius: 6px;
    background: var(--blue-light); color: var(--blue);
  }
  .elev-tab.active { background: var(--blue); color: white; }

  /* ── PORT DIAGRAM ── */
  .port-box {
    background: var(--navy); color: #94a3b8; border-radius: 10px;
    padding: 14px; font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: clamp(0.6rem, 1.6vw, 0.72rem);
    line-height: 1.8; overflow-x: auto; white-space: pre;
    margin-top: 10px;
  }
  .port-box .lbl { color: #e2e8f0; font-weight: 600; }
  .port-box .s1 { color: #38bdf8; }
  .port-box .s2 { color: #fbbf24; }
  .port-box .flip { color: #f87171; font-weight: 700; }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center; padding: 40px 20px;
    color: var(--ink-muted);
  }
  .empty-icon { font-size: 2.5rem; margin-bottom: 8px; opacity: 0.4; }
  .empty p { font-size: 0.88rem; }

  /* ── FOOTER ── */
  .footer {
    text-align: center; padding: 24px 0 12px;
    font-size: 0.72rem; color: var(--ink-muted);
  }
  .footer a { color: var(--amber); text-decoration: none; }

  @media (prefers-reduced-motion: reduce) {
    .result, .step { animation: none; }
  }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="badge">EVI01 &middot; US-CENTRAL-07A</div>
    <h1>IB Switch Lookup</h1>
    <p>Enter a switch name. Get directions to find it.</p>
  </div>

  <div class="input-group">
    <input class="input-field" id="input" type="text" placeholder="C1.17, S1.5.2, L10.1.2..."
           autocomplete="off" spellcheck="false">
    <button class="btn-go" id="goBtn" onclick="lookup()">Find</button>
  </div>

  <div class="examples">
    <span class="ex-chip" onclick="tryExample('C1.17')">C1.17</span>
    <span class="ex-chip" onclick="tryExample('S1.5.2')">S1.5.2</span>
    <span class="ex-chip" onclick="tryExample('S8.3.2')">S8.3.2</span>
    <span class="ex-chip" onclick="tryExample('L10.1.2')">L10.1.2</span>
    <span class="ex-chip" onclick="tryExample('C7.19')">C7.19</span>
  </div>

  <div id="output">
    <div class="empty">
      <div class="empty-icon">&#128270;</div>
      <p>Type a switch name above to get started</p>
    </div>
  </div>

  <div class="footer">
    <a href="visual-sop.html">Full Field Guide</a> &middot;
    <a href="sop.html">Text SOP</a> &middot;
    EVI01
  </div>

</div>

<script>
// ═══════════════════════════════════════════
// SWITCH PARSER
// ═══════════════════════════════════════════

function parseSwitch(raw) {
  const s = raw.trim().toUpperCase();
  if (!s) return null;

  // Match: C1.17, S1.5.2, S8.3.2, L10.1.2, L10.1.2-DH2, etc.
  // Optional port: C1.17 17/2
  const m = s.match(/^([CSLN])(\d+)\.(.+?)(?:\s+(\d+)\/(\d+))?$/);
  if (!m) return null;

  const prefix = m[1];
  const firstNum = m[2];
  const rest = m[3].replace(/-DH\d+$/i, ''); // strip DH suffix for parsing
  const dhSuffix = s.match(/-DH(\d+)/i);
  const port = m[4] || null;
  const lane = m[5] || null;

  const types = { C: 'Core', S: 'Spine', L: 'Leaf', N: 'Node' };
  const type = types[prefix] || prefix;

  let dh, elevTabs, cabHint, searchName;

  switch (prefix) {
    case 'C':
      dh = 'DH1';
      elevTabs = [
        { label: 'DH1 Row 5 ELEV', active: true },
        { label: 'DH1 Row 6 ELEV', active: true },
        { label: 'DH1 Row 22 ELEV', active: false },
      ];
      cabHint = `Core group <strong>${firstNum}</strong> — look for <code>C${firstNum}</code> in the pod diagram on the overhead tab.`;
      searchName = `C${firstNum}.${rest}`;
      break;

    case 'S':
      // Spines can be in DH1 (core-spine links) or DH2
      // S1-S8 groups exist in both, but physical location is usually DH2 for spine switches
      dh = 'DH2 (check DH1 if not found)';
      elevTabs = [
        { label: 'DH2 Row 13 ELEV', active: true },
        { label: 'DH2 Row 14 ELEV', active: true },
        { label: 'DH1 Row 5 ELEV', active: false },
        { label: 'DH1 Row 6 ELEV', active: false },
      ];
      cabHint = `Spine group <strong>${firstNum}</strong> — look for <code>S${firstNum}</code> in the pod diagram.`;
      searchName = `S${firstNum}.${rest}`;
      break;

    case 'L':
      const leafDH = dhSuffix ? `DH${dhSuffix[1]}` : 'DH1 or DH2';
      dh = leafDH;
      if (leafDH === 'DH2') {
        elevTabs = [
          { label: 'DH2 Row 13 ELEV', active: true },
          { label: 'DH2 Row 14 ELEV', active: true },
        ];
      } else if (leafDH === 'DH1') {
        elevTabs = [
          { label: 'DH1 Row 5 ELEV', active: false },
          { label: 'DH1 Row 6 ELEV', active: false },
          { label: 'DH1 Row 22 ELEV', active: true },
        ];
      } else {
        elevTabs = [
          { label: 'DH1 Row 22 ELEV', active: true },
          { label: 'DH2 Row 13 ELEV', active: true },
          { label: 'DH2 Row 14 ELEV', active: true },
        ];
      }
      cabHint = `Leaf in cabinet <strong>${firstNum}</strong>. Leaves are at the end of compute rows.`;
      searchName = `L${firstNum}.${rest}`;
      break;

    case 'N':
      dh = 'Check both DH1 and DH2';
      elevTabs = [];
      cabHint = `Node <strong>${firstNum}</strong> — compute nodes are in the server rows. Check NetBox for exact location.`;
      searchName = `N${firstNum}.${rest}`;
      break;
  }

  return {
    raw: s,
    prefix,
    type,
    firstNum,
    rest,
    fullName: searchName,
    port,
    lane,
    dh,
    elevTabs,
    cabHint,
  };
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════

function lookup() {
  const input = document.getElementById('input').value;
  const sw = parseSwitch(input);
  const out = document.getElementById('output');

  if (!sw) {
    out.innerHTML = `
      <div class="callout callout-danger">
        <span class="callout-icon">!</span>
        <div><strong>Can't parse that.</strong> Enter a switch name like <code>C1.17</code>, <code>S1.5.2</code>, or <code>L10.1.2-DH2</code>.</div>
      </div>`;
    return;
  }

  const typeClass = `type-${sw.type.toLowerCase()}`;
  const portInfo = sw.port ? `, port <strong>${sw.port}</strong>, lane <strong>/${sw.lane}</strong>` : '';

  // Elevation tab chips
  const tabsHtml = sw.elevTabs.length > 0
    ? `<div class="elev-tabs">${sw.elevTabs.map(t =>
        `<span class="elev-tab${t.active ? ' active' : ''}">${t.label}</span>`
      ).join('')}</div>`
    : '';

  // Port reference (only if port was given)
  const portStep = sw.port ? `
    <div class="step">
      <div class="step-num">Step 5</div>
      <h3>Verify port ${sw.port}/${sw.lane}</h3>
      <p>Find port <code>${sw.port}</code> on the device. Lane <code>/${sw.lane}</code> tells you which slot on the optic.</p>
      <div class="port-box"><span class="lbl">Top Row (normal):</span>
  Port:  │<span class="s1"> /1 </span>│<span class="s2"> /2 </span>│    │<span class="s1"> /3 </span>│<span class="s2"> /4 </span>│

<span class="lbl">Bottom Row</span> <span class="flip">FLIPPED:</span>
  Port:  │<span class="s2"> /2 </span>│<span class="s1"> /1 </span>│    │<span class="s2"> /4 </span>│<span class="s1"> /3 </span>│</div>
      <div class="callout callout-danger">
        <span class="callout-icon">!</span>
        <div><strong>Bottom row optics are flipped.</strong> Slot 1 and 2 swap sides. Double-check before touching.</div>
      </div>
    </div>` : `
    <div class="step">
      <div class="step-num">Reference</div>
      <h3>Port orientation</h3>
      <p>When you get to the device, remember the slot flip rule:</p>
      <div class="port-box"><span class="lbl">Top Row (normal):</span>
  Port:  │<span class="s1"> /1 </span>│<span class="s2"> /2 </span>│    │<span class="s1"> /3 </span>│<span class="s2"> /4 </span>│

<span class="lbl">Bottom Row</span> <span class="flip">FLIPPED:</span>
  Port:  │<span class="s2"> /2 </span>│<span class="s1"> /1 </span>│    │<span class="s2"> /4 </span>│<span class="s1"> /3 </span>│</div>
    </div>`;

  out.innerHTML = `
    <div class="result">
      <span class="type-badge ${typeClass}">${sw.type}</span>

      <div class="parsed">
        <div class="parsed-row">
          <span class="parsed-label">Switch</span>
          <span class="parsed-value">${sw.fullName}</span>
        </div>
        <div class="parsed-row">
          <span class="parsed-label">Type</span>
          <span class="parsed-value">${sw.type}</span>
        </div>
        <div class="parsed-row">
          <span class="parsed-label">Data Hall</span>
          <span class="parsed-value">${sw.dh}</span>
        </div>
        ${sw.port ? `<div class="parsed-row">
          <span class="parsed-label">Port</span>
          <span class="parsed-value">${sw.port}/${sw.lane}</span>
        </div>` : ''}
      </div>

      <div class="steps">
        <div class="step">
          <div class="step-num">Step 1</div>
          <h3>Open IB Sketch &rarr; Overhead tab</h3>
          <p>${sw.cabHint}</p>
          <p style="margin-top:6px;">Find the pod that contains <code>${sw.fullName.split('.')[0]}</code>. Note the <strong>cabinet numbers</strong> and the <strong>row number</strong> at the edge of the pod.</p>
        </div>

        <div class="step">
          <div class="step-num">Step 2</div>
          <h3>Walk to the row</h3>
          <p>The row number from the pod diagram is printed on the floor at the end of each row. Go there.</p>
        </div>

        <div class="step">
          <div class="step-num">Step 3</div>
          <h3>Open the elevation tab</h3>
          <p>In IB Sketch, click <strong>"All Sheets"</strong> (bottom left, next to the overhead tab). Select the elevation tab for your row:</p>
          ${tabsHtml}
          <div class="callout callout-info" style="margin-top:10px;">
            <span class="callout-icon">i</span>
            <div>Use <strong>Ctrl+F</strong> (or Cmd+F) and search <code>${sw.fullName}</code> to find it fast.</div>
          </div>
        </div>

        <div class="step">
          <div class="step-num">Step 4</div>
          <h3>Find <code>${sw.fullName}</code> in the elevation</h3>
          <p>The elevation shows rack diagrams for each cabinet. Find <code>${sw.fullName}</code> — note the <strong>cabinet number</strong> and <strong>device position</strong> (counted from top of rack).</p>
          <p style="margin-top:6px;">Now you know: <strong>row</strong>, <strong>cabinet</strong>, <strong>device position</strong>. Go to the rack.</p>
        </div>

        ${portStep}
      </div>
    </div>`;
}

function tryExample(val) {
  document.getElementById('input').value = val;
  lookup();
}

// Enter key triggers lookup
document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter') lookup();
});

// Auto-focus
document.getElementById('input').focus();
</script>
</body>
</html>
